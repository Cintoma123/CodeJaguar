
name: Publish codejaguar-review

# Publishes the CLI package to both the public npm registry and GitHub Packages.
# The package bundles the compiled TypeScript CLI (cli/dist) and the Python
# backend (backend/ copied into cli/backend at publish time). The ui/ and docs/
# folders are never part of the package — the "files" whitelist in
# cli/package.json (dist, bin, backend) guarantees that.
#
# Bun has no separate registry: `bun install -g codejaguar-review` reads from
# the same npm registry, so the npm publish below covers Bun users too.
#
# Required secret:
#   NPM_TOKEN — an npm automation/publish token for the package owner.
# GitHub Packages uses the built-in GITHUB_TOKEN (no secret to configure).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 1.2.3 (blank = use cli/package.json)."
        required: false
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Build CLI (tsc -> dist)
        working-directory: cli
        run: npm run build

      - name: Resolve & set version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VER="${{ github.event.release.tag_name }}"
          else
            VER="${{ github.event.inputs.version }}"
          fi
          VER="${VER#v}"   # strip a leading "v" (v1.2.3 -> 1.2.3)
          if [ -n "$VER" ]; then
            echo "Setting package version to $VER"
            (cd cli && npm pkg set version="$VER")
          else
            echo "No version supplied; keeping cli/package.json version."
          fi
          echo "Publishing version: $(cd cli && node -p "require('./package.json').version")"

      - name: Bundle the Python backend into the package
        run: |
          rm -rf cli/backend
          mkdir -p cli/backend
          rsync -a \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '.python-version' \
            --exclude 'claude.md' \
            --exclude 'CLAUDE.md' \
            backend/ cli/backend/
          echo "Bundled backend contents:"
          find cli/backend -maxdepth 2 -type f | sort

      - name: Include README & LICENSE on the package page
        run: |
          [ -f README.md ] && cp README.md cli/README.md || true
          [ -f LICENSE ] && cp LICENSE cli/LICENSE || true

      - name: Verify package contents (dry run)
        working-directory: cli
        run: npm publish --dry-run

      - name: Drop dev-only files before upload
        run: rm -rf cli/node_modules

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: cli
          include-hidden-files: true
          retention-days: 1

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: cli

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        working-directory: cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: cli

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scope the package to the repo owner & point at GitHub Packages
        working-directory: cli
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          # GitHub Packages requires a scoped name matching the repo owner.
          npm pkg set name="@${OWNER}/codejaguar-review"
          cat > .npmrc <<EOF
          @${OWNER}:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}
          EOF

      - name: Publish to GitHub Packages
        working-directory: cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
